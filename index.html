<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Cube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #FF4F00;
  --accent-dim: #cc3f00;
  --warn: #ffaa00;
  --danger: #ff4444;
  --success: #44cc66;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* Panel */
#panel {
  width: 360px;
  min-width: 360px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-track { background: transparent; }
#panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

h1 {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
}

h1 span { color: var(--text2); font-weight: 400; }

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  margin-bottom: 8px;
}

/* URL inputs */
.url-group { display: flex; flex-direction: column; gap: 8px; }

.url-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.url-row label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
}

.url-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s;
}

.url-row input:focus { border-color: var(--accent); }
.url-row input::placeholder { color: #444; }

/* Sliders */
.slider-group { display: flex; flex-direction: column; gap: 14px; }

.slider-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.slider-label {
  font-size: 13px;
  font-weight: 500;
}

.slider-value {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent);
}

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}

/* Warnings */
#warnings {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.warning {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 8px 10px;
  border-radius: 4px;
  border-left: 3px solid var(--warn);
  background: rgba(255, 170, 0, 0.08);
  color: var(--warn);
}

.warning.error {
  border-left-color: var(--danger);
  background: rgba(255, 68, 68, 0.08);
  color: var(--danger);
}

/* Export button */
#exportBtn {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  text-transform: uppercase;
}

#exportBtn:hover { background: var(--accent-dim); }
#exportBtn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Status */
#status {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  text-align: center;
}

/* Distribution info */
#distInfo {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.6;
  padding: 8px 10px;
  background: var(--bg);
  border-radius: 4px;
  border: 1px solid var(--border);
  display: none;
}

/* Viewport */
#viewport {
  flex: 1;
  position: relative;
  background: var(--bg);
}

#viewport canvas { display: block; }

/* Responsive */
@media (max-width: 800px) {
  body { flex-direction: column; }
  #panel {
    width: 100%;
    min-width: unset;
    height: auto;
    max-height: 50vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  #viewport { height: 50vh; }
}
</style>
</head>
<body>

<div id="panel">
  <h1>QR CUBE <span>// 3D print</span></h1>

  <div>
    <div class="section-label">URLs (up to 6)</div>
    <div class="url-group" id="urlGroup"></div>
  </div>

  <div id="distInfo"></div>

  <div>
    <div class="section-label">Parameters</div>
    <div class="slider-group">
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label">Cube Size</span>
          <span class="slider-value" id="sizeVal">50 mm</span>
        </div>
        <input type="range" id="sizeSlider" min="20" max="100" value="50" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label">Engrave Depth</span>
          <span class="slider-value" id="depthVal">1.5 mm</span>
        </div>
        <input type="range" id="depthSlider" min="0.5" max="3" value="1.5" step="0.1">
      </div>
    </div>
  </div>

  <div id="warnings"></div>

  <button id="exportBtn">Export STL</button>

  <div id="status">Ready</div>
</div>

<div id="viewport"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

// ─── State ───
let cubeSize = 50;
let engraveDepth = 1.5;
let urls = ['', '', '', '', '', ''];
let cubeMesh = null;
let rebuildTimeout = null;

// ─── Three.js Setup ───
const viewport = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
camera.position.set(80, 60, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
viewport.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 30;
controls.maxDistance = 300;

// Lighting
const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
dirLight.position.set(60, 80, 60);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
fillLight.position.set(-40, 20, -40);
scene.add(fillLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// Grid helper
const gridHelper = new THREE.GridHelper(120, 24, 0x222222, 0x1a1a1a);
gridHelper.position.y = -40;
scene.add(gridHelper);

function resize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ─── QR Generation ───
function getQRModules(url) {
  if (!url || !url.trim()) return null;
  try {
    const qr = qrcode(0, 'H');
    qr.addData(url.trim());
    qr.make();
    const count = qr.getModuleCount();
    const grid = [];
    for (let r = 0; r < count; r++) {
      const row = [];
      for (let c = 0; c < count; c++) {
        row.push(qr.isDark(r, c) ? 1 : 0);
      }
      grid.push(row);
    }
    return { grid, count };
  } catch (e) {
    return { error: e.message };
  }
}

// ─── URL Distribution ───
function distributeURLs() {
  const active = [];
  for (let i = 0; i < 6; i++) {
    if (urls[i] && urls[i].trim()) active.push(urls[i].trim());
  }

  // 6 faces: front, back, right, left, top, bottom
  const faces = [null, null, null, null, null, null];

  if (active.length === 0) return faces;
  if (active.length === 1) {
    return [active[0], active[0], active[0], active[0], active[0], active[0]];
  }
  if (active.length === 2) {
    return [active[0], active[0], active[0], active[1], active[1], active[1]];
  }
  if (active.length === 3) {
    return [active[0], active[0], active[1], active[1], active[2], active[2]];
  }
  // 4-6: one per face, remainder null
  for (let i = 0; i < active.length && i < 6; i++) {
    faces[i] = active[i];
  }
  return faces;
}

// ─── Face Orientation Table ───
// Each face: { normal, uAxis, vAxis } in world space
// QR is laid out in U (col) and V (row, top-to-bottom) on each face
const FACE_TABLE = [
  { name: 'front',  normal: [0, 0, 1],  uAxis: [1, 0, 0],  vAxis: [0, 1, 0]  },
  { name: 'back',   normal: [0, 0, -1], uAxis: [-1, 0, 0], vAxis: [0, 1, 0]  },
  { name: 'right',  normal: [1, 0, 0],  uAxis: [0, 0, -1], vAxis: [0, 1, 0]  },
  { name: 'left',   normal: [-1, 0, 0], uAxis: [0, 0, 1],  vAxis: [0, 1, 0]  },
  { name: 'top',    normal: [0, 1, 0],  uAxis: [1, 0, 0],  vAxis: [0, 0, -1] },
  { name: 'bottom', normal: [0, -1, 0], uAxis: [1, 0, 0],  vAxis: [0, 0, 1]  },
];

// ─── Geometry Engine ───
function buildFaceGeometry(faceIndex, qrData, size, depth) {
  const face = FACE_TABLE[faceIndex];
  const n = new THREE.Vector3(...face.normal);
  const u = new THREE.Vector3(...face.uAxis);
  const v = new THREE.Vector3(...face.vAxis);
  const half = size / 2;

  // Face center on cube surface
  const center = n.clone().multiplyScalar(half);

  if (!qrData || qrData.error) {
    // Blank face — single flat quad
    return buildBlankFace(center, u, v, n, size);
  }

  const { grid, count } = qrData;
  const quietZone = 4;
  const totalModules = count + quietZone * 2;
  const pitch = size / totalModules;

  const positions = [];
  const normals = [];

  // Helper to get height of a cell (1 = dark/recessed, 0 = light/flush)
  function cellDark(row, col) {
    const qr = row - quietZone;
    const qc = col - quietZone;
    if (qr < 0 || qr >= count || qc < 0 || qc >= count) return false;
    return grid[qr][qc] === 1;
  }

  function cellDepth(row, col) {
    return cellDark(row, col) ? -depth : 0;
  }

  // For each cell, emit a quad at the appropriate depth
  for (let row = 0; row < totalModules; row++) {
    for (let col = 0; col < totalModules; col++) {
      const d = cellDepth(row, col);

      // Cell corners in UV space (origin at bottom-left of face)
      const u0 = (col / totalModules - 0.5) * size;
      const u1 = ((col + 1) / totalModules - 0.5) * size;
      // V axis: row 0 is top of QR, so flip
      const v0 = (0.5 - row / totalModules) * size;
      const v1 = (0.5 - (row + 1) / totalModules) * size;

      // 3D positions of quad corners
      const p00 = center.clone().add(u.clone().multiplyScalar(u0)).add(v.clone().multiplyScalar(v0)).add(n.clone().multiplyScalar(d));
      const p10 = center.clone().add(u.clone().multiplyScalar(u1)).add(v.clone().multiplyScalar(v0)).add(n.clone().multiplyScalar(d));
      const p11 = center.clone().add(u.clone().multiplyScalar(u1)).add(v.clone().multiplyScalar(v1)).add(n.clone().multiplyScalar(d));
      const p01 = center.clone().add(u.clone().multiplyScalar(u0)).add(v.clone().multiplyScalar(v1)).add(n.clone().multiplyScalar(d));

      // Two triangles (CCW when viewed from outside = along normal)
      pushTri(positions, normals, p00, p10, p11, n);
      pushTri(positions, normals, p00, p11, p01, n);

      // Vertical walls where height transitions occur
      // Right neighbor
      if (col < totalModules - 1) {
        const dRight = cellDepth(row, col + 1);
        if (d !== dRight) {
          buildWall(positions, normals, center, u, v, n, u1, v0, v1, d, dRight, 'right');
        }
      }
      // Bottom neighbor
      if (row < totalModules - 1) {
        const dBelow = cellDepth(row + 1, col);
        if (d !== dBelow) {
          buildWall(positions, normals, center, u, v, n, u0, u1, v1, d, dBelow, 'bottom');
        }
      }
    }
  }

  // Edge walls — connect face surface to cube edge
  // Top edge (row=0)
  for (let col = 0; col < totalModules; col++) {
    const d = cellDepth(0, col);
    if (d !== 0) {
      const uL = (col / totalModules - 0.5) * size;
      const uR = ((col + 1) / totalModules - 0.5) * size;
      const vTop = 0.5 * size;
      const pA = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vTop)).add(n.clone().multiplyScalar(0));
      const pB = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vTop)).add(n.clone().multiplyScalar(0));
      const pC = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vTop)).add(n.clone().multiplyScalar(d));
      const pD = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vTop)).add(n.clone().multiplyScalar(d));
      const wallN = v.clone();
      pushTri(positions, normals, pA, pB, pC, wallN);
      pushTri(positions, normals, pA, pC, pD, wallN);
    }
  }
  // Bottom edge (row=totalModules-1)
  for (let col = 0; col < totalModules; col++) {
    const d = cellDepth(totalModules - 1, col);
    if (d !== 0) {
      const uL = (col / totalModules - 0.5) * size;
      const uR = ((col + 1) / totalModules - 0.5) * size;
      const vBot = -0.5 * size;
      const pA = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vBot)).add(n.clone().multiplyScalar(0));
      const pB = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vBot)).add(n.clone().multiplyScalar(0));
      const pC = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vBot)).add(n.clone().multiplyScalar(d));
      const pD = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vBot)).add(n.clone().multiplyScalar(d));
      const wallN = v.clone().negate();
      pushTri(positions, normals, pA, pB, pC, wallN);
      pushTri(positions, normals, pA, pC, pD, wallN);
    }
  }
  // Left edge (col=0)
  for (let row = 0; row < totalModules; row++) {
    const d = cellDepth(row, 0);
    if (d !== 0) {
      const uL = -0.5 * size;
      const vT = (0.5 - row / totalModules) * size;
      const vB = (0.5 - (row + 1) / totalModules) * size;
      const pA = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vB)).add(n.clone().multiplyScalar(0));
      const pB = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vT)).add(n.clone().multiplyScalar(0));
      const pC = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vT)).add(n.clone().multiplyScalar(d));
      const pD = center.clone().add(u.clone().multiplyScalar(uL)).add(v.clone().multiplyScalar(vB)).add(n.clone().multiplyScalar(d));
      const wallN = u.clone().negate();
      pushTri(positions, normals, pA, pB, pC, wallN);
      pushTri(positions, normals, pA, pC, pD, wallN);
    }
  }
  // Right edge (col=totalModules-1)
  for (let row = 0; row < totalModules; row++) {
    const d = cellDepth(row, totalModules - 1);
    if (d !== 0) {
      const uR = 0.5 * size;
      const vT = (0.5 - row / totalModules) * size;
      const vB = (0.5 - (row + 1) / totalModules) * size;
      const pA = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vT)).add(n.clone().multiplyScalar(0));
      const pB = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vB)).add(n.clone().multiplyScalar(0));
      const pC = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vB)).add(n.clone().multiplyScalar(d));
      const pD = center.clone().add(u.clone().multiplyScalar(uR)).add(v.clone().multiplyScalar(vT)).add(n.clone().multiplyScalar(d));
      const wallN = u.clone();
      pushTri(positions, normals, pA, pB, pC, wallN);
      pushTri(positions, normals, pA, pC, pD, wallN);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  return geo;
}

function buildBlankFace(center, u, v, n, size) {
  const half = size / 2;
  const p00 = center.clone().add(u.clone().multiplyScalar(-half)).add(v.clone().multiplyScalar(-half));
  const p10 = center.clone().add(u.clone().multiplyScalar(half)).add(v.clone().multiplyScalar(-half));
  const p11 = center.clone().add(u.clone().multiplyScalar(half)).add(v.clone().multiplyScalar(half));
  const p01 = center.clone().add(u.clone().multiplyScalar(-half)).add(v.clone().multiplyScalar(half));

  const positions = [];
  const normals = [];
  pushTri(positions, normals, p01, p11, p10, n);
  pushTri(positions, normals, p01, p10, p00, n);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  return geo;
}

function pushTri(positions, normals, a, b, c, normal) {
  positions.push(a.x, a.y, a.z, b.x, b.y, b.z, c.x, c.y, c.z);
  normals.push(normal.x, normal.y, normal.z, normal.x, normal.y, normal.z, normal.x, normal.y, normal.z);
}

function buildWall(positions, normals, center, u, v, n, param1, param2, param3, dA, dB, direction) {
  if (direction === 'right') {
    // Wall along the right edge of a cell at u=param1, from v=param2 (top) to v=param3 (bottom)
    const uPos = param1;
    const vTop = param2;
    const vBot = param3;

    const pATop = center.clone().add(u.clone().multiplyScalar(uPos)).add(v.clone().multiplyScalar(vTop)).add(n.clone().multiplyScalar(dA));
    const pABot = center.clone().add(u.clone().multiplyScalar(uPos)).add(v.clone().multiplyScalar(vBot)).add(n.clone().multiplyScalar(dA));
    const pBTop = center.clone().add(u.clone().multiplyScalar(uPos)).add(v.clone().multiplyScalar(vTop)).add(n.clone().multiplyScalar(dB));
    const pBBot = center.clone().add(u.clone().multiplyScalar(uPos)).add(v.clone().multiplyScalar(vBot)).add(n.clone().multiplyScalar(dB));

    // Wall normal: perpendicular to the wall, pointing toward the higher side
    // If dA > dB (left is higher), normal points in +u direction
    // If dA < dB (right is higher), normal points in -u direction
    const wallNormal = dA > dB ? u.clone() : u.clone().negate();

    if (dA > dB) {
      // Left side is higher (flush), right is recessed
      pushTri(positions, normals, pATop, pABot, pBBot, wallNormal);
      pushTri(positions, normals, pATop, pBBot, pBTop, wallNormal);
    } else {
      // Right side is higher
      pushTri(positions, normals, pBTop, pBBot, pABot, wallNormal);
      pushTri(positions, normals, pBTop, pABot, pATop, wallNormal);
    }
  } else if (direction === 'bottom') {
    // Wall along the bottom edge of a cell at v=param3, from u=param1 (left) to u=param2 (right)
    const uLeft = param1;
    const uRight = param2;
    const vPos = param3;

    const pALeft = center.clone().add(u.clone().multiplyScalar(uLeft)).add(v.clone().multiplyScalar(vPos)).add(n.clone().multiplyScalar(dA));
    const pARight = center.clone().add(u.clone().multiplyScalar(uRight)).add(v.clone().multiplyScalar(vPos)).add(n.clone().multiplyScalar(dA));
    const pBLeft = center.clone().add(u.clone().multiplyScalar(uLeft)).add(v.clone().multiplyScalar(vPos)).add(n.clone().multiplyScalar(dB));
    const pBRight = center.clone().add(u.clone().multiplyScalar(uRight)).add(v.clone().multiplyScalar(vPos)).add(n.clone().multiplyScalar(dB));

    // If dA > dB (top is higher), normal points in +v direction
    const wallNormal = dA > dB ? v.clone() : v.clone().negate();

    if (dA > dB) {
      pushTri(positions, normals, pARight, pALeft, pBLeft, wallNormal);
      pushTri(positions, normals, pARight, pBLeft, pBRight, wallNormal);
    } else {
      pushTri(positions, normals, pBRight, pBLeft, pALeft, wallNormal);
      pushTri(positions, normals, pBRight, pALeft, pARight, wallNormal);
    }
  }
}

function buildCubeGeometry() {
  const faceURLs = distributeURLs();
  const geometries = [];
  const warnings = [];
  let hasAnyQR = false;

  for (let i = 0; i < 6; i++) {
    const url = faceURLs[i];
    let qrData = null;

    if (url) {
      qrData = getQRModules(url);
      if (qrData && qrData.error) {
        warnings.push({ face: FACE_TABLE[i].name, msg: qrData.error });
        qrData = null;
      } else if (qrData) {
        hasAnyQR = true;
        const totalMods = qrData.count + 8;
        const pitch = cubeSize / totalMods;
        if (pitch < 1.0) {
          warnings.push({
            face: FACE_TABLE[i].name,
            msg: `Module pitch ${pitch.toFixed(2)}mm — may be too small to print cleanly. Use a shorter URL or larger cube.`
          });
        }
      }
    }

    const geo = buildFaceGeometry(i, qrData, cubeSize, engraveDepth);
    if (geo) geometries.push(geo);
  }

  if (geometries.length === 0) return { mesh: null, triCount: 0, warnings };

  const merged = BufferGeometryUtils.mergeGeometries(geometries, false);
  const triCount = merged.attributes.position.count / 3;

  return { geometry: merged, triCount, warnings, hasAnyQR };
}

// ─── Rebuild ───
function rebuild() {
  if (cubeMesh) {
    scene.remove(cubeMesh);
    cubeMesh.geometry.dispose();
    cubeMesh.material.dispose();
    cubeMesh = null;
  }

  const result = buildCubeGeometry();

  if (result.geometry) {
    const material = new THREE.MeshStandardMaterial({
      color: 0xcccccc,
      roughness: 0.6,
      metalness: 0.1,
      flatShading: false,
    });
    cubeMesh = new THREE.Mesh(result.geometry, material);
    scene.add(cubeMesh);
  }

  // Update warnings
  const warningsEl = document.getElementById('warnings');
  warningsEl.innerHTML = '';
  for (const w of result.warnings) {
    const div = document.createElement('div');
    div.className = 'warning' + (w.msg.includes('error') ? ' error' : '');
    div.textContent = `${w.face}: ${w.msg}`;
    warningsEl.appendChild(div);
  }

  // Update status
  const status = document.getElementById('status');
  const activeCount = urls.filter(u => u.trim()).length;
  if (result.triCount > 0) {
    status.textContent = `${result.triCount.toLocaleString()} triangles · ${activeCount} URL${activeCount !== 1 ? 's' : ''} · ${cubeSize}mm`;
  } else {
    status.textContent = 'Enter a URL to generate QR cube';
  }

  // Update distribution info
  updateDistInfo();

  // Export button
  document.getElementById('exportBtn').disabled = !result.hasAnyQR;
}

function updateDistInfo() {
  const el = document.getElementById('distInfo');
  const active = urls.filter(u => u.trim());
  if (active.length === 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  const faceURLs = distributeURLs();
  const lines = [];
  const faceNames = ['Front', 'Back', 'Right', 'Left', 'Top', 'Bottom'];
  for (let i = 0; i < 6; i++) {
    const url = faceURLs[i];
    if (url) {
      const short = url.length > 28 ? url.slice(0, 28) + '…' : url;
      lines.push(`${faceNames[i]}: ${short}`);
    } else {
      lines.push(`${faceNames[i]}: blank`);
    }
  }
  el.textContent = lines.join('\n');
}

function scheduleRebuild(delay = 0) {
  clearTimeout(rebuildTimeout);
  rebuildTimeout = setTimeout(rebuild, delay);
}

// ─── UI Setup ───
const urlGroup = document.getElementById('urlGroup');
for (let i = 0; i < 6; i++) {
  const row = document.createElement('div');
  row.className = 'url-row';
  const label = document.createElement('label');
  label.textContent = (i + 1);
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = i === 0 ? 'https://example.com' : '';
  input.spellcheck = false;
  input.autocomplete = 'off';
  input.addEventListener('input', () => {
    urls[i] = input.value;
    scheduleRebuild(300);
  });
  row.appendChild(label);
  row.appendChild(input);
  urlGroup.appendChild(row);
}

// Sliders
const sizeSlider = document.getElementById('sizeSlider');
const depthSlider = document.getElementById('depthSlider');
const sizeVal = document.getElementById('sizeVal');
const depthVal = document.getElementById('depthVal');

sizeSlider.addEventListener('input', () => {
  cubeSize = parseFloat(sizeSlider.value);
  sizeVal.textContent = `${cubeSize} mm`;
  scheduleRebuild(0);
});

depthSlider.addEventListener('input', () => {
  engraveDepth = parseFloat(depthSlider.value);
  depthVal.textContent = `${engraveDepth.toFixed(1)} mm`;
  scheduleRebuild(0);
});

// Export
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!cubeMesh) return;
  const exporter = new STLExporter();
  const result = exporter.parse(cubeMesh, { binary: true });
  const blob = new Blob([result], { type: 'application/octet-stream' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `qr-cube-${cubeSize}mm.stl`;
  link.click();
  URL.revokeObjectURL(link.href);
});

// Initial build (blank cube)
rebuild();
</script>
</body>
